name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Guards against unix-only APIs (tokio::signal::unix, nix::unistd, …) leaking
  # into the cross-platform binary. cargo-dist builds against 5 targets on tag
  # push (including x86_64-pc-windows-msvc) and any regression there aborts the
  # entire release. Failing here is much cheaper than failing there.
  check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # libdbus-1-dev is required by libdbus-sys (transitive: keyring →
      # secret-service on Linux). macOS uses Keychain (no dbus), Windows
      # uses Credential Manager (no dbus).
      - name: Install libdbus (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo check --workspace --all-targets

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo test --workspace

  # Drift check for the LLM-facing doc artifacts committed under
  # docs/aidoc/. Non-blocking (continue-on-error): cargo-aidoc pins the
  # rustdoc JSON format_version, and any nightly bump ahead of a
  # cargo-aidoc release trips a FormatVersionMismatch. When that fires,
  # bumping cargo-aidoc (in ../cargo-aidoc) is the right fix, not
  # pinning nightly here. Failures show up in the Actions UI so we know
  # to regenerate.
  aidoc:
    name: cargo aidoc --check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus (Linux)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install cargo-aidoc
        run: cargo install cargo-aidoc --locked
      - run: cargo aidoc --check --strict
