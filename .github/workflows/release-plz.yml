name: Release-plz

on:
  push:
    branches: [main]
  # Manual trigger for recovery from a mid-release-cycle infra failure
  # (e.g. the release PR merge run failed for a missing system dep and the
  # follow-up fix push doesn't re-fire the publish path because release-plz
  # only publishes off release-PR-merge commits). Run via `gh workflow run
  # release-plz.yml --ref main` or the GH Actions UI.
  workflow_dispatch:

permissions: {}

jobs:
  # Publishes unreleased crates + pushes the unified v<ver> tag when the
  # release PR lands on main. The tag push fires release.yml (cargo-dist).
  # RELEASE_PLZ_TOKEN must be a PAT: tags pushed with the default
  # GITHUB_TOKEN do not trigger other workflows.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ynishi' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      # persona-wire-credentials → keyring → secret-service on Linux pulls in
      # libdbus-sys, which requires libdbus-1-dev + pkg-config at build time
      # (release-plz's cargo publish verify step compiles each crate). Kept
      # in sync with ci.yml and dist-workspace.toml `[dist.dependencies.apt]`.
      - name: Install libdbus (Linux system dep for keyring)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens/updates the release PR (version bump + CHANGELOG) on every push
  # to main. Merging that PR is the human release gate.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ynishi' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      # Same libdbus rationale as `release-plz-release` above — release-plz's
      # PR-open step runs cargo metadata / package inspection that pulls in
      # libdbus-sys via the credentials crate's Linux path.
      - name: Install libdbus (Linux system dep for keyring)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
