[workspace]
resolver = "2"
members = [
    "crates/persona-wire-core",
    "crates/persona-wire-mcp",
    "crates/persona-wire",
    "crates/persona-wire-adapter-mini-app",
]

[workspace.package]
version = "0.2.2"
edition = "2021"
authors = ["Yutaka Nishimura"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/ynishi/persona-wire"
rust-version = "1.78"
keywords = ["mcp", "graph", "knowledge-graph", "persona", "context"]
categories = ["database", "data-structures"]

[workspace.dependencies]
# Shared utility deps
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { version = "1", features = ["full"] }

# Storage
rusqlite = { version = "0.32", features = ["bundled"] }

# MCP server
rmcp = { version = "1", features = ["server", "transport-io"] }
schemars = "1"

# CLI
clap = { version = "4", features = ["derive"] }

# URI parse (Adapter source_uri query string)
url = "2"

# Plugin trait (dyn-compatible async fn — Adapter / Projection)
async-trait = "0.1"

# Intra-workspace
persona-wire-core = { path = "crates/persona-wire-core", version = "0.2.2" }
persona-wire-adapter-mini-app = { path = "crates/persona-wire-adapter-mini-app", version = "0.2.2" }
